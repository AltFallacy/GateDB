{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 450px; padding-top: 4rem;">
    <div class="card">
        <h2 style="margin-top: 0; text-align: center;">Welcome Back</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Sign in to manage your database requests.</p>
        
        <form action="/login" method="POST">
            {% if error %}
            <div style="background-color: rgba(255,59,48,0.1); color: #ff3b30; padding: 10px; border-radius: 6px; margin-bottom: 1rem; border: 1px solid rgba(255,59,48,0.2); text-align: center;">
                {{ error }}
            </div>
            {% endif %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('signup') }}">Create one</a>
        </p>
    </div>
</div>
{% endblock %}
