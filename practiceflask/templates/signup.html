{% extends "base.html" %}
{% block content %}
<div class="container" style="max-width: 450px; padding-top: 4rem;">
    <div class="card">
        <h2 style="margin-top: 0; text-align: center;">Create Account</h2>
        <p style="color: var(--text-muted); text-align: center; margin-bottom: 2rem;">Join GateDB and start managing your queries.</p>
        
        <form action="/signup" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="role">Requested Role</label>
                <select name="role" id="role" required>
                    <option value="" disabled selected>Select a Role</option>
                    <option value="admin">Admin</option>
                    <option value="user">User</option>
                    <option value="guest">Guest</option>
                </select>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Sign Up</button>
        </form>
        
        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted);">
            Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
